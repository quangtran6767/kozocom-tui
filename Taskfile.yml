version: "3"

vars:
  BINARY: kozocom-tui

tasks:
  default:
    desc: List all available tasks
    cmd: task --list

  build:
    desc: Build the binary
    cmd: go build -o {{.BINARY}} .

  run:
    desc: Build and run the app
    cmd: go run .

  test:
    desc: Run all tests
    cmd: go test ./... -v

  test:gotestsum:
    desc: Run tests with gotestsum (requires gotestsum)
    cmd: gotestsum --format testdox ./...

  lint:
    desc: Run linter (requires golangci-lint)
    cmd: golangci-lint run ./...

  clean:
    desc: Remove build artifacts
    cmd: rm -f {{.BINARY}}

  tidy:
    desc: Tidy go modules
    cmd: go mod tidy
